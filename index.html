<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck — Interactive Personality Insight Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    


    <div class="layout-container">
       
        <main class="left-panel" id="app">
            
          
            <section class="view active" id="intro-view">
                <div class="content-wrapper">
                    <div class="badge fade-in-up">Quick Personality Check</div>
                    <h1 class="title fade-in-up delay-1">Let's figure you out.</h1>
                    <p class="subtitle fade-in-up delay-2">60 seconds. No overthinking. Just pick what feels right.</p>
                    <button class="brutal-btn primary fade-in-up delay-3" id="start-btn">Start the journey</button>
                </div>
            </section>

            
            <section class="view hidden" id="quiz-view">
                <div class="quiz-header">
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <div class="question-counter" id="question-counter">1 / 8</div>
                </div>
                
                <div class="question-content">
                    <h2 class="question-text" id="question-text"></h2>
                    
                    <div class="options-container" id="options-container">
                     <!-- options -->
                    </div>
                </div>
                
                
                <div class="micro-text" id="micro-text">hmm... interesting 👀</div>
            </section>

         
            <section class="view hidden" id="loading-view">
                <div class="content-wrapper text-center">
                    <div class="brutal-loader"></div>
                    <h2 class="loading-title">Calculating your vibe...</h2>
                    <p class="loading-subtitle">Doing complex math on your choices.</p>
                </div>
            </section>

           
            <section class="view hidden" id="result-view">
                <div class="content-wrapper">
                    <div class="badge fade-in-up">The Verdict</div>
                    <h2 class="result-title fade-in-up delay-1" id="result-title"></h2>
                    
                    <div class="brutal-card primary-card fade-in-up delay-2">
                        <p class="result-desc" id="result-desc"></p>
                    </div>
                    
                    <div class="brutal-card roast-card fade-in-up delay-3">
                        <div class="card-header">Reality Check</div>
                        <p id="result-reality-check"></p>
                    </div>

                    <div class="result-grid fade-in-up delay-4">
                        <div class="brutal-card list-card">
                            <div class="card-header">Superpowers</div>
                            <ul id="result-strengths"></ul>
                        </div>
                        <div class="brutal-card list-card">
                            <div class="card-header">Kryptonite</div>
                            <ul id="result-weaknesses"></ul>
                        </div>
                    </div>

                    <div class="brutal-card advice-card fade-in-up delay-5">
                        <div class="card-header">One Piece of Advice</div>
                        <p id="result-growth"></p>
                    </div>

                    <button class="brutal-btn secondary fade-in-up delay-6" id="retake-btn">Go Again?</button>
                </div>
            </section>
        </main>

    
        <aside class="right-panel">
            <div class="character-container">
                
                
                <div class="char-wrap" id="char-blob">
                    <svg viewBox="0 0 200 200" class="svg-char" xmlns="http://www.w3.org/2000/svg">
                        <path class="svg-body bg-yellow" d="M45.7,-76.4C58.9,-69.3,69.1,-55.4,76.5,-41C83.9,-26.6,88.5,-11.7,85.2,1.8C81.9,15.3,70.7,27.5,61.4,39.9C52.1,52.3,44.7,64.9,33.5,73.1C22.3,81.3,7.3,85,-8.3,86.1C-23.9,87.2,-40.1,85.7,-52.1,77.3C-64.1,68.9,-71.9,53.6,-77.8,38.5C-83.7,23.4,-87.7,8.5,-85.5,-5.5C-83.3,-19.5,-74.9,-32.6,-64.3,-43.3C-53.7,-54,-40.9,-62.3,-27.6,-69.1C-14.3,-75.9,0.5,-81.2,16.2,-80.7C31.9,-80.2,46.5,-73.9,45.7,-76.4Z" transform="translate(100 100)" />
                        <!-- Face -->
                        <g class="svg-face" transform="translate(70, 80)">
                            <circle cx="15" cy="10" r="4" fill="#000"/>
                            <circle cx="45" cy="10" r="4" fill="#000"/>
                            <path d="M 25 20 Q 30 25 35 20" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
                        </g>
                    </svg>
                </div>

                
                <div class="char-wrap" id="char-star">
                    <svg viewBox="0 0 200 200" class="svg-char" xmlns="http://www.w3.org/2000/svg">
                        <path class="svg-body bg-pink" d="M100,10 L120,70 L180,80 L130,120 L150,180 L100,140 L50,180 L70,120 L20,80 L80,70 Z" />
                        <!-- Face -->
                        <g class="svg-face" transform="translate(65, 85)">
                            <ellipse cx="20" cy="15" rx="3" ry="5" fill="#000"/>
                            <ellipse cx="50" cy="15" rx="3" ry="5" fill="#000"/>
                            <line x1="30" y1="25" x2="40" y2="25" stroke="#000" stroke-width="3" stroke-linecap="round"/>
                        </g>
                    </svg>
                </div>

                
                <div class="char-wrap" id="char-pill">
                    <svg viewBox="0 0 200 200" class="svg-char" xmlns="http://www.w3.org/2000/svg">
                        <rect class="svg-body bg-blue" x="40" y="70" width="120" height="60" rx="30" />
                        
                        <g class="svg-face" transform="translate(85, 95)">
                            <circle cx="0" cy="0" r="3" fill="#000"/>
                            <circle cx="30" cy="0" r="3" fill="#000"/>
                            <path d="M 10 5 Q 15 10 20 5" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
                        </g>
                    </svg>
                </div>
                
                
                <div class="deco-element" id="deco-1"></div>
                <div class="deco-element" id="deco-2"></div>
                <div class="deco-element" id="deco-3"></div>

            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
